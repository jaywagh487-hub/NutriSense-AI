{% extends "base.html" %}
{% set active = "form" %}
{% block title %}Health Analysis — NutriSense AI{% endblock %}

{% block body %}
<div class="content-plain" style="background:linear-gradient(160deg, var(--ivory), var(--green-100)); position:relative; overflow:hidden; display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 62px);">
  <div class="ambient-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
  <div class="card card-sm reveal in-view" style="position:relative;z-index:1;">

      <div class="eyebrow">Step 1 of 1</div>
      <h2 style="font-size:1.6rem;font-weight:800;color:var(--green-900);margin-bottom:4px;">Your Health Profile</h2>
      <p style="color:var(--text-soft);font-size:0.9rem;margin-bottom:24px;">Fill in your details to get a personalised nutrition dashboard.</p>

      <form action="/dashboard" method="POST">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" placeholder="e.g. Priya Sharma" required>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group">
            <label>Height (cm)</label>
            <input type="number" name="height" placeholder="165" min="100" max="250" required>
          </div>
          <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" name="weight" placeholder="60" min="20" max="300" required>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="25" min="1" max="120">
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
              <option value="">Select</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Activity Level</label>
          <select name="activity">
            <option value="sedentary">Sedentary (desk job, little exercise)</option>
            <option value="light">Lightly active (1–3 days/week)</option>
            <option value="moderate" selected>Moderately active (3–5 days/week)</option>
            <option value="very">Very active (6–7 days/week)</option>
          </select>
        </div>

        <button class="btn btn-block" type="submit" style="margin-top:8px;">
          🚀 Go to My Dashboard
        </button>

      </form>

      <p style="text-align:center;margin-top:14px;font-size:0.78rem;color:var(--text-mute);">
        🔒 Your data is processed locally and never stored.
      </p>

    </div>
</div>
{% endblock %}
